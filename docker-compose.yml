services:
  frontend:
    # Image tag injected by the GitHub Actions deploy job (FRONTEND_IMAGE env var)
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}
    env_file:
      - .env.deploy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "80:8080"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
