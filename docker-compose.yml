services:
  frontend:
    image: ${FRONTEND_IMAGE:-bestpi-frontend:dev}
    build:
      context: .
      dockerfile: frontend/BestPI.Frontend/Dockerfile
    env_file:
      - .env.deploy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "80:8080"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
