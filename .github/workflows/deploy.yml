name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Where to deploy (production runs full rollout)"
        required: true
        default: production
        type: choice
        options:
          - production
          - smoke

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Run pytest
        run: .venv/bin/pytest

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build Blazor frontend
        run: dotnet build frontend/BestPI.Frontend/BestPI.Frontend.csproj

  changes:
    runs-on: ubuntu-latest
    outputs:
      db: ${{ steps.filter.outputs.db }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            db:
              - 'scrapers/clinicaltrials/storage.py'
              - 'migrations/**'

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/bestpi-frontend
        run: |
          docker build -f frontend/BestPI.Frontend/Dockerfile -t ${IMAGE_NAME}:${GITHUB_SHA} -t ${IMAGE_NAME}:latest .
          docker push ${IMAGE_NAME}:${GITHUB_SHA}
          docker push ${IMAGE_NAME}:latest

  deploy-app:
    runs-on: ubuntu-latest
    needs:
      - build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'production')
    steps:
      - name: Validate deploy secrets
        run: |
          : "${APP_SSH_KEY:?APP_SSH_KEY secret is required for deploy}"
          : "${GHCR_TOKEN:?DEPLOY_GHCR_PAT secret is required for deploy}"
          : "${PG_CONN:?DEPLOY_PG_CONN secret is required for deploy}"
          : "${PG_DSN:?DEPLOY_PG_DSN secret is required for deploy}"
        env:
          APP_SSH_KEY: ${{ secrets.APP_SSH_KEY }}
          GHCR_TOKEN: ${{ secrets.DEPLOY_GHCR_PAT }}
          PG_CONN: ${{ secrets.DEPLOY_PG_CONN }}
          PG_DSN: ${{ secrets.DEPLOY_PG_DSN }}

      - name: Deploy application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.APP_HOST }}
          username: ${{ secrets.APP_USER }}
          key: ${{ secrets.APP_SSH_KEY }}
          script: |
            export GHCR_TOKEN="${{ secrets.DEPLOY_GHCR_PAT }}"
            export GHCR_USERNAME="${{ github.repository_owner }}"
            export GITHUB_REPOSITORY="${{ github.repository }}"
            export REPO_DIR="/opt/bestpi/BestPIClinicalTrialSelector"
            export DEPLOY_ENV_FILE="/opt/bestpi/.env.deploy"
            mkdir -p "$(dirname "${REPO_DIR}")"
            if [ ! -d "${REPO_DIR}/.git" ]; then
              echo "Cloning ${GITHUB_REPOSITORY} into ${REPO_DIR}"
              git clone "https://github.com/${GITHUB_REPOSITORY}.git" "${REPO_DIR}"
            else
              echo "Repository already present at ${REPO_DIR}"
            fi
            cat <<'ENVEOF' > "${DEPLOY_ENV_FILE}"
            ConnectionStrings__Postgres=${{ secrets.DEPLOY_PG_CONN }}
            POSTGRES_DSN=${{ secrets.DEPLOY_PG_DSN }}
            ENVEOF
            chmod 600 "${DEPLOY_ENV_FILE}"
            bash ${REPO_DIR}/scripts/deploy_app.sh main

  deploy-smoke:
    runs-on: ubuntu-latest
    needs:
      - build
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'smoke'
    steps:
      - name: Validate smoke secrets
        run: |
          : "${APP_SSH_KEY:?APP_SSH_KEY secret is required for smoke deploy}"
          : "${GHCR_TOKEN:?DEPLOY_GHCR_PAT secret is required for smoke deploy}"
        env:
          APP_SSH_KEY: ${{ secrets.APP_SSH_KEY }}
          GHCR_TOKEN: ${{ secrets.DEPLOY_GHCR_PAT }}

      - name: Verify SSH connectivity
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.APP_HOST }}
          username: ${{ secrets.APP_USER }}
          key: ${{ secrets.APP_SSH_KEY }}
          script: |
            echo "Smoke deploy connection successful on $(hostname)"
            docker info >/dev/null 2>&1 && echo "Docker is reachable"

  deploy-db:
    runs-on: ubuntu-latest
    needs:
      - changes
    if: needs.changes.outputs.db == 'true'
    steps:
      - name: Notify schema change
        run: |
          echo "Database schema changes detected. Please run scripts/run_db_migrations.sh manually on the DB host."
